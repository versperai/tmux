# ================================================================
# TMUX 配置文件 (~/.config/tmux/tmux.conf)
# ================================================================

# --- 1. 修改前缀键为 Alt + b ---
# M 代表 Meta 键（即 Alt）
set -g prefix M-b
unbind C-b
bind M-b send-prefix

# --- 2. 基础性能与交互设置 ---
set -g mouse on               # 启用鼠标支持
set -g allow-passthrough on   # 允许图片透传 (针对 nvim-image 等)
set -g default-terminal "xterm-ghostty"   # 让 timg/viu 识别 Kitty 图形协议
set -g base-index 1           # 窗口编号从 1 开始
setw -g pane-base-index 1      # 窗格编号从 1 开始
set -s escape-time 0          # 解决 Vim 按下 Esc 延迟问题

# --- 3. 分屏快捷键重绑定 ---
# 按下 Alt+b 后按 / 左右分屏
unbind %
bind / split-window -h -c "#{pane_current_path}"
# 按下 Alt+b 后按 - 上下分屏
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# --- 4. 窗格焦点切换 (Alt + hjkl) ---
# -n 表示无需按下前缀键直接生效
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# --- 5. 窗格位置交换 (Alt + Shift + hjkl) ---
# 将当前窗格与 指定方向 的窗格交换位置
# 使用 run-shell 确保方向精准
bind -n M-H run-shell 'tmux select-pane -L && tmux swap-pane -s "!"'
bind -n M-J run-shell 'tmux select-pane -D && tmux swap-pane -s "!"'
bind -n M-K run-shell 'tmux select-pane -U && tmux swap-pane -s "!"'
bind -n M-L run-shell 'tmux select-pane -R && tmux swap-pane -s "!"'

# --- 6. 快捷配置重载 ---
# 按下 Alt+b 后按 r 重新加载配置并提示
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"
# tmux source-file ~/.tmux.conf

# --- 插件列表 ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # 保存/恢复会话
set -g @plugin 'tmux-plugins/tmux-continuum'   # 自动保存/恢复

# --- 插件配置 ---
# 允许恢复 Neovim 等程序（需要程序支持）
set -g @resurrect-strategy-nvim 'session'
# 启用自动恢复功能（tmux 启动时自动恢复上次会话）
set -g @continuum-restore 'on'
# 每 15 分钟自动保存一次
set -g @continuum-save-interval '15'

# --- 手动保存快捷键 ---
# Ctrl+Alt+s 直接保存，无需按前缀键
bind -n C-M-s run-shell 'bash ~/.tmux/plugins/tmux-resurrect/scripts/save.sh'
# Ctrl+Alt+Shift+r 直接恢复（不用 Ctrl+Alt+r 避免和 Hyprland 录屏冲突）
bind -n C-M-R run-shell 'bash ~/.tmux/plugins/tmux-resurrect/scripts/restore.sh'

# --- 7. 键盘协议透传（让 Ctrl+/, Shift+Enter 等在 tmux 里也能用） ---
# 启用 kitty/CSI u 扩展键协议，Neovim 原生支持解码
set -g extended-keys always
set -g extended-keys-format csi-u
# 告知 tmux 外层终端 (ghostty/foot) 支持扩展键
set -as terminal-features 'xterm*:extkeys'
# 兜底：如果终端发送原始 0x1F 字节
bind -n C-_ send-keys C-_

# 初始化 TPM (这行必须留在最底部)
run '~/.tmux/plugins/tpm/tpm'
